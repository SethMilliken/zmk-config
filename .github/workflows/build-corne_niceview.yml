name: 'Build Corne nice!view Firmware'
on:
  workflow_dispatch:  # can be triggered manually
  push:               # automatically run on changes to following paths
    paths:
      - 'build/corne_niceview.yaml'
      - 'config/west.yml'
      - 'config/corne.*'
      - 'config/shared.dtsi'

jobs:
  build:
    # uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    uses: petejohanson/zmk/.github/workflows/build-user-config.yml@core-dump-experimentation
    with:
      build_matrix_path: build/corne_niceview.yaml
      archive_name: corne_niceview
